<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PVE // UPLINK</title>
    <!-- Tailwind CSS for layout mostly, styled with custom CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen flex flex-col">
    
    <!-- Top Nav -->
    <nav class="border-b border-cyan-dim bg-black/50 backdrop-blur-md px-6 py-4 flex justify-between items-center z-50 sticky top-0">
        <div class="flex items-center gap-3">
            <i class="ph-fill ph-target text-3xl text-cyan glitch" data-text=""></i>
            <div>
                <h1 class="text-xl font-bold text-cyan leading-none font-mono tracking-widest">PVE_UPLINK<span class="animate-pulse">_</span></h1>
                <div class="text-[10px] text-cyan/50 font-mono tracking-widest mt-1">SYS.READY // MULTI-NODE</div>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <span id="nav-username" class="hidden text-xs font-mono text-cyan-dim"></span>
            <button id="nav-btn-dashboard" class="hidden cyber-btn text-xs py-1.5 px-3">DASHBOARD</button>
            <button id="nav-btn-servers" class="hidden cyber-btn text-xs py-1.5 px-3">SERVERS</button>
            <button id="logout-btn" class="hidden cyber-btn danger text-xs py-1.5 px-3">DISCONNECT</button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 p-4 md:p-8 max-w-6xl mx-auto w-full relative z-10 flex flex-col">
        
        <!-- Auth View (Login / Register) -->
        <div id="auth-view" class="flex-1 flex flex-col items-center justify-center animate-fade-in max-w-md mx-auto w-full">
            <div class="cyber-card w-full">
                <div class="text-center mb-8">
                    <h2 id="auth-title" class="text-2xl font-bold text-cyan font-mono tracking-widest mb-2">AUTH_REQ</h2>
                    <p id="auth-subtitle" class="text-xs text-cyan-dim font-mono">Establish secure local terminal session</p>
                </div>
                
                <form id="auth-form" class="space-y-6">
                    <div>
                        <label class="block text-xs font-mono text-cyan mb-2">_USERNAME</label>
                        <input type="text" id="auth-username" required class="cyber-input" placeholder="sysadmin">
                    </div>
                    <div>
                        <label class="block text-xs font-mono text-cyan mb-2">_PASSWORD</label>
                        <input type="password" id="auth-password" required class="cyber-input" placeholder="••••••••">
                    </div>
                    
                    <div id="auth-error" class="hidden text-xs font-mono text-magenta border border-magenta p-2 bg-magenta/10"></div>
                    
                    <button type="submit" id="auth-submit" class="cyber-btn w-full mt-4">INITIALIZE</button>
                </form>
                
                <div class="mt-6 text-center">
                    <button id="auth-toggle-btn" class="text-xs font-mono text-cyan-dim hover:text-cyan transition-colors">>> Switch to Network Registration</button>
                </div>
            </div>
        </div>

        <!-- Dashboard View (Server Health Grid) -->
        <div id="dashboard-view" class="hidden flex-1 animate-fade-in">
            <div class="flex justify-between items-end mb-6">
                <div>
                    <h2 class="text-2xl font-bold text-cyan font-mono tracking-widest glitch" data-text="NET_OP_CENTER">NET_OP_CENTER</h2>
                    <div class="text-xs text-cyan-dim font-mono mt-1">// AGGREGATED FLEET TELEMETRY</div>
                </div>
            </div>

            <div id="dashboard-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Server Cards injected here -->
            </div>
        </div>

        <!-- Server Config View (List and Add) -->
        <div id="servers-view" class="hidden flex-1 animate-fade-in">
             <div class="flex justify-between items-end mb-6">
                <div>
                    <h2 class="text-2xl font-bold text-cyan font-mono tracking-widest">INFRA_LINKS</h2>
                    <div class="text-xs text-cyan-dim font-mono mt-1">// MANAGED PROXMOX NODES</div>
                </div>
                <button id="add-server-btn" class="cyber-btn py-1.5 text-xs">+ ADD UPLINK</button>
            </div>

            <!-- Server List -->
            <div id="server-list" class="space-y-4 mb-8">
                <!-- Servers injected here -->
            </div>

            <!-- Add Server Form -->
            <div id="add-server-form-container" class="hidden cyber-card max-w-2xl mx-auto">
                <h3 class="text-lg font-bold text-cyan font-mono mb-4">ESTABLISH_NEW_LINK</h3>
                <form id="add-server-form" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-mono text-cyan mb-1">_ALIAS</label>
                            <input type="text" id="srv-name" required class="cyber-input" placeholder="Production Cluster">
                        </div>
                        <div>
                            <label class="block text-xs font-mono text-cyan mb-1">_HOST / IP</label>
                            <input type="text" id="srv-host" required class="cyber-input" placeholder="10.0.0.10:8006">
                        </div>
                        <div>
                            <label class="block text-xs font-mono text-cyan mb-1">_PVE USER / TOKEN ID</label>
                            <input type="text" id="srv-username" required class="cyber-input" placeholder="root@pam or api@pve!token">
                        </div>
                        <div>
                            <label class="block text-xs font-mono text-cyan mb-1">_PVE PASSWORD / SECRET</label>
                            <input type="password" id="srv-password" required class="cyber-input" placeholder="••••••••">
                        </div>
                    </div>
                    
                    <div class="flex items-center gap-3 mt-4">
                        <input type="checkbox" id="srv-verify-ssl" class="w-4 h-4 bg-black border-cyan text-cyan focus:ring-cyan focus:ring-offset-black">
                        <label for="srv-verify-ssl" class="text-xs font-mono text-cyan-dim">_REQUIRE_STRICT_SSL</label>
                    </div>
                    
                    <div id="srv-error" class="hidden text-xs font-mono text-magenta border border-magenta p-2 bg-magenta/10 mt-4"></div>
                    
                    <div class="flex justify-end gap-4 mt-6">
                        <button type="button" id="cancel-srv-btn" class="cyber-btn text-cyan-dim py-1.5 px-4" style="border-color:#333; color:#777;">CANCEL</button>
                        <button type="submit" id="save-srv-btn" class="cyber-btn py-1.5 px-6">ESTABLISH LINK</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Node Details View (VM List) -->
        <div id="node-details-view" class="hidden flex-1 animate-fade-in pb-10">
            <button id="back-to-dashboard" class="text-xs font-mono text-cyan hover:text-white mb-6 flex items-center gap-2">
                <i class="ph ph-caret-left"></i> RETURN TO NET_OP_CENTER
            </button>
            
            <div class="flex justify-between items-end mb-6">
                <div>
                    <h2 class="text-2xl font-bold text-cyan font-mono tracking-widest cyber-badge inline-block text-lg mb-2 pl-3 pr-3" style="font-size: 1.25rem;">LINK // <span id="detail-server-name" class="text-white"></span></h2>
                    <h3 class="text-xl font-bold text-cyan-dim font-mono tracking-widest mt-1">NODE: <span id="detail-node-name" class="text-white"></span></h3>
                </div>
                <div class="cyber-badge border-cyan px-3 py-1 text-sm font-bold">
                    VM_COUNT: <span id="detail-vm-count">0</span>
                </div>
            </div>
            
            <div id="vms-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <!-- VMs injected here -->
            </div>
        </div>
        
    </main>

    <!-- Global loading overlay -->
    <div id="loading-overlay" class="hidden fixed inset-0 z-[100] bg-black/80 backdrop-blur-md flex justify-center items-center flex-col">
        <i class="ph ph-circle-notch animate-spin text-5xl text-cyan mb-4"></i>
        <div class="text-cyan font-mono tracking-widest text-sm animate-pulse">PROCESSING_TELEMETRY...</div>
    </div>

    <!-- JS -->
    <script src="app.js"></script>
</body>
</html>
